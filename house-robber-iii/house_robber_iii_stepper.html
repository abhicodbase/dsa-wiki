
<!DOCTYPE html>
<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:13px;color:var(--color-text-primary)}
.nav{display:flex;gap:10px;justify-content:center;margin-top:14px}
button{font-size:13px;padding:6px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer}
button:hover{background:var(--color-background-secondary)}
button:disabled{opacity:.35;cursor:default}
.dots{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--color-border-secondary);transition:background .2s}
.dot.active{background:var(--color-text-primary)}
.desc{font-size:13px;color:var(--color-text-secondary);line-height:1.6;min-height:48px;padding:0 4px;margin-bottom:10px}
.legend{display:flex;gap:16px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.swatch{width:12px;height:12px;border-radius:3px}
</style>
</head>
<body>
<div style="padding:1rem 0">
  <div class="dots" id="dots"></div>

  <div class="legend">
    <div class="leg"><div class="swatch" style="background:var(--color-background-info);border:1px solid var(--color-text-info)"></div>active node</div>
    <div class="leg"><div class="swatch" style="background:var(--color-background-success);border:1px solid var(--color-text-success)"></div>robbed</div>
    <div class="leg"><div class="swatch" style="background:var(--color-background-secondary);border:1px solid var(--color-border-secondary)"></div>skipped</div>
  </div>

  <svg width="100%" viewBox="0 0 680 240" id="svg">
    <g id="edges">
      <line x1="340" y1="42" x2="200" y2="102" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
      <line x1="340" y1="42" x2="480" y2="102" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
      <line x1="200" y1="122" x2="130" y2="182" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
      <line x1="200" y1="122" x2="270" y2="182" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
      <line x1="480" y1="122" x2="410" y2="182" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
      <line x1="480" y1="122" x2="550" y2="182" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
    </g>
    <g id="nodes"></g>
    <g id="labels"></g>
  </svg>

  <div id="desc" class="desc"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-tertiary);margin-bottom:6px">return pair {rob, skip}</div>
      <div id="pair-box" style="font-family:var(--font-mono);font-size:13px;color:var(--color-text-primary)">—</div>
    </div>
    <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-tertiary);margin-bottom:6px">best at this node</div>
      <div id="best-box" style="font-family:var(--font-mono);font-size:13px;color:var(--color-text-primary)">—</div>
    </div>
  </div>

  <div class="nav">
    <button id="prev" onclick="go(-1)" disabled>← prev</button>
    <button id="next" onclick="go(1)">next →</button>
  </div>
</div>

<script>
// Tree: [3,2,3,null,3,null,1]
//         3
//        / \
//       2   3
//        \    \
//         3    1
const nodeData = [
  {id:'root', val:3, cx:340, cy:32},
  {id:'L',   val:2, cx:200, cy:112},
  {id:'R',   val:3, cx:480, cy:112},
  {id:'LL',  val:null, cx:130, cy:192},  // null
  {id:'LR',  val:3, cx:270, cy:192},
  {id:'RL',  val:null, cx:410, cy:192},  // null
  {id:'RR',  val:1, cx:550, cy:192},
];

// pairs: {rob, skip} computed bottom-up
// leaves: rob=val, skip=0
// LR(3): rob=3, skip=0
// RR(1): rob=1, skip=0
// L(2):  rob = 2 + skip(null)+skip(LR) = 2+0+0=2,  skip = max(0,0)+max(3,0)=3  → {2,3}
// R(3):  rob = 3 + skip(null)+skip(RR) = 3+0+0=3,  skip = max(0,0)+max(1,0)=1  → {3,1}
// root(3): rob=3+skip(L)+skip(R)=3+3+1=7, skip=max(2,3)+max(3,1)=3+3=6 → {7,6}

const steps = [
  {
    active:['LR'],
    state:{LR:{rob:3,skip:0}},
    pair:'{rob=3, skip=0}',
    best:'max(3,0) = 3',
    desc:'Postorder: visit LR first (leaf, val=3). Rob it → 3. Skip it → 0. Return <b>{3, 0}</b>.'
  },
  {
    active:['RR'],
    state:{LR:{rob:3,skip:0}, RR:{rob:1,skip:0}},
    pair:'{rob=1, skip=0}',
    best:'max(1,0) = 1',
    desc:'Visit RR (leaf, val=1). Rob → 1. Skip → 0. Return <b>{1, 0}</b>.'
  },
  {
    active:['L'],
    state:{LR:{rob:3,skip:0}, RR:{rob:1,skip:0}, L:{rob:2,skip:3}},
    pair:'{rob=2, skip=3}',
    best:'max(2,3) = 3',
    desc:'Node L (val=2). <b>Rob</b>: 2 + skip(LL=null→0) + skip(LR=0) = <b>2</b>. <b>Skip</b>: max(rob,skip)(LL=0) + max(3,0) = 0+3 = <b>3</b>. Best: skip wins → 3.'
  },
  {
    active:['R'],
    state:{LR:{rob:3,skip:0}, RR:{rob:1,skip:0}, L:{rob:2,skip:3}, R:{rob:3,skip:1}},
    pair:'{rob=3, skip=1}',
    best:'max(3,1) = 3',
    desc:'Node R (val=3). <b>Rob</b>: 3 + skip(RL=null→0) + skip(RR=0) = <b>3</b>. <b>Skip</b>: max(0,0) + max(1,0) = 0+1 = <b>1</b>. Best: rob wins → 3.'
  },
  {
    active:['root'],
    state:{LR:{rob:3,skip:0}, RR:{rob:1,skip:0}, L:{rob:2,skip:3}, R:{rob:3,skip:1}, root:{rob:7,skip:6}},
    pair:'{rob=7, skip=6}',
    best:'max(7,6) = 7 ✓',
    desc:'Root (val=3). <b>Rob</b>: 3 + skip(L=3) + skip(R=1) = <b>7</b>. <b>Skip</b>: max(2,3) + max(3,1) = 3+3 = <b>6</b>. Answer = <b>max(7,6) = 7</b>.'
  }
];

const R = 18;
const svgNS = 'http://www.w3.org/2000/svg';
let cur = 0;

function colorFor(id, step) {
  const s = steps[step];
  const state = s.state || {};
  if (s.active.includes(id)) return {fill:'var(--color-background-info)', stroke:'var(--color-text-info)'};
  if (state[id]) {
    const {rob,skip} = state[id];
    // show as robbed if rob >= skip (it "would" be robbed), else skipped
    if (rob >= skip) return {fill:'var(--color-background-success)', stroke:'var(--color-text-success)'};
    return {fill:'var(--color-background-secondary)', stroke:'var(--color-border-secondary)'};
  }
  return {fill:'var(--color-background-primary)', stroke:'var(--color-border-secondary)'};
}

function render() {
  const s = steps[cur];
  const ng = document.getElementById('nodes');
  const lg = document.getElementById('labels');
  ng.innerHTML = ''; lg.innerHTML = '';

  nodeData.forEach(n => {
    if (n.val === null) {
      // draw small null marker
      const t = document.createElementNS(svgNS,'text');
      t.setAttribute('x', n.cx); t.setAttribute('y', n.cy);
      t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','central');
      t.setAttribute('font-size','11'); t.setAttribute('fill','var(--color-text-tertiary)');
      t.setAttribute('font-family','var(--font-sans)');
      t.textContent = 'null';
      ng.appendChild(t);
      return;
    }
    const {fill,stroke} = colorFor(n.id, cur);
    const c = document.createElementNS(svgNS,'circle');
    c.setAttribute('cx',n.cx); c.setAttribute('cy',n.cy); c.setAttribute('r',R);
    c.setAttribute('fill',fill); c.setAttribute('stroke',stroke); c.setAttribute('stroke-width','1');
    ng.appendChild(c);
    const t = document.createElementNS(svgNS,'text');
    t.setAttribute('x',n.cx); t.setAttribute('y',n.cy);
    t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','central');
    t.setAttribute('font-size','13'); t.setAttribute('font-weight','500');
    t.setAttribute('fill','var(--color-text-primary)');
    t.setAttribute('font-family','var(--font-sans)');
    t.textContent = n.val;
    ng.appendChild(t);

    // pair label below node
    const state = s.state || {};
    if (state[n.id]) {
      const {rob,skip} = state[n.id];
      const lbl = document.createElementNS(svgNS,'text');
      lbl.setAttribute('x', n.cx);
      lbl.setAttribute('y', n.cy + R + 12);
      lbl.setAttribute('text-anchor','middle');
      lbl.setAttribute('font-size','10');
      lbl.setAttribute('fill','var(--color-text-tertiary)');
      lbl.setAttribute('font-family','var(--font-mono)');
      lbl.textContent = `{${rob},${skip}}`;
      lg.appendChild(lbl);
    }
  });

  document.getElementById('desc').innerHTML = s.desc;
  document.getElementById('pair-box').textContent = s.pair;
  document.getElementById('best-box').textContent = s.best;

  const dc = document.getElementById('dots');
  dc.innerHTML = '';
  steps.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i===cur?' active':'');
    dc.appendChild(d);
  });
  document.getElementById('prev').disabled = cur===0;
  document.getElementById('next').disabled = cur===steps.length-1;
  document.getElementById('next').textContent = cur===steps.length-1 ? 'done ✓' : 'next →';
}

function go(d) { cur = Math.max(0, Math.min(steps.length-1, cur+d)); render(); }
render();
</script>
</body>
</html>
