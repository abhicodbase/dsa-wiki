
<h2 class="sr-only">Wiggle Sort II — step-by-step showing sort, split into smaller and larger halves, then interleave in reverse to avoid equal-neighbor collisions</h2>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
  <div style="font-size:13px;color:var(--color-text-secondary);" id="step-label">Step 1 of 5</div>
  <div style="display:flex;gap:8px;">
    <button id="prev-btn"><i class="ti ti-arrow-left" aria-hidden="true"></i> Prev</button>
    <button id="next-btn">Next <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
  </div>
</div>

<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;font-size:12px;color:var(--color-text-secondary);">
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:11px;height:11px;border-radius:3px;background:var(--color-background-info);border:0.5px solid var(--color-border-info);display:inline-block;"></span>smaller half (odd indices)</span>
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:11px;height:11px;border-radius:3px;background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);display:inline-block;"></span>larger half (even indices)</span>
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:11px;height:11px;border-radius:3px;background:var(--color-background-success);border:0.5px solid var(--color-border-success);display:inline-block;"></span>placed in result</span>
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:11px;height:11px;border-radius:3px;background:var(--color-background-danger);border:0.5px solid var(--color-border-danger);display:inline-block;"></span>currently placing</span>
</div>

<div id="widget-body"></div>

<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;font-size:13px;line-height:1.8;min-height:80px;margin-top:12px;" id="explain-box"></div>

<script>
const orig = [1,5,1,1,6,4];
const n = orig.length;
const sorted = [...orig].sort((a,b)=>a-b);
const mid = Math.floor((n-1)/2);
const small = sorted.slice(0, mid+1);
const large = sorted.slice(mid+1);
const result = new Array(n).fill(null);

const steps = [];

steps.push({
  phase: 'original',
  arr: orig,
  msg: `<strong>Problem:</strong> Rearrange nums so that nums[0] &lt; nums[1] &gt; nums[2] &lt; nums[3] ... (strict zigzag). Input: [${orig}].<br>
<strong>Why naive interleave fails:</strong> If duplicates sit next to each other (e.g. two 1s), the strict inequality breaks. We need a smarter split.`
});

steps.push({
  phase: 'sorted',
  arr: sorted,
  msg: `<strong>Step 1 — sort.</strong> sorted = [${sorted}].<br>
Split at the median (index ${mid}): smaller half = [${small}] (indices 0..${mid}), larger half = [${large}] (indices ${mid+1}..${n-1}).`
});

steps.push({
  phase: 'halves',
  small, large,
  msg: `<strong>Step 2 — two halves.</strong> Blue = smaller half [${small}], Orange = larger half [${large}].<br>
Plan: place smaller half into <strong>odd indices</strong> (1,3,5,...) and larger half into <strong>even indices</strong> (0,2,4,...) of the result. But we place them in <strong>reverse order</strong> — largest of each half goes first. This separates duplicates that might be at the boundary.`
});

const placing = [];
const res = new Array(n).fill(null);
let si = small.length-1, li = large.length-1;
let pi = 1;
while (pi < n) { res[pi] = small[si--]; placing.push({idx:pi, val:res[pi], type:'small'}); pi+=2; }
pi = 0;
while (pi < n) { res[pi] = large[li--]; placing.push({idx:pi, val:res[pi], type:'large'}); pi+=2; }

steps.push({
  phase: 'placing',
  placing,
  result: res,
  msg: `<strong>Step 3 — interleave in reverse.</strong><br>
Odd positions (1,3,5) ← smaller half reversed: ${small.slice().reverse().join(' → ')}<br>
Even positions (0,2,4) ← larger half reversed: ${large.slice().reverse().join(' → ')}<br>
Reversing prevents equal neighbors when duplicates straddle the median.`
});

steps.push({
  phase: 'done',
  result: res,
  msg: `<strong>Done.</strong> Result = [${res}]. Verify: ${res.map((v,i)=>{
    if(i===0) return '';
    if(i%2===1) return res[i-1]+'<'+res[i];
    return res[i-1]+'>'+res[i];
  }).filter(Boolean).join(', ')}. All strict inequalities hold.`
});

let idx = 0;

function makeCell(val, color, label) {
  const c = color || 'default';
  let bg = 'var(--color-background-primary)';
  let bd = 'var(--color-border-tertiary)';
  let tc = 'var(--color-text-primary)';
  if (c==='info')    { bg='var(--color-background-info)';    bd='var(--color-border-info)';    tc='var(--color-text-info)'; }
  if (c==='warning') { bg='var(--color-background-warning)'; bd='var(--color-border-warning)'; tc='var(--color-text-warning)'; }
  if (c==='success') { bg='var(--color-background-success)'; bd='var(--color-border-success)'; tc='var(--color-text-success)'; }
  if (c==='danger')  { bg='var(--color-background-danger)';  bd='var(--color-border-danger)';  tc='var(--color-text-danger)'; }
  if (c==='secondary') { bg='var(--color-background-secondary)'; tc='var(--color-text-secondary)'; }
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
    ${label!==undefined?`<div style="font-size:10px;color:var(--color-text-tertiary);">${label}</div>`:''}
    <div style="width:40px;height:40px;border-radius:var(--border-radius-md);border:0.5px solid ${bd};background:${bg};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:${tc};">${val!==null?val:''}</div>
  </div>`;
}

function renderRow(cells) {
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">${cells}</div>`;
}

function render() {
  const s = steps[idx];
  document.getElementById('step-label').textContent = `Step ${idx+1} of ${steps.length}`;
  document.getElementById('explain-box').innerHTML = s.msg;

  let html = '';

  if (s.phase === 'original') {
    html += `<div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:6px;">input</div>`;
    html += renderRow(s.arr.map((v,i)=>makeCell(v,'default',`i=${i}`)).join(''));
  }

  if (s.phase === 'sorted') {
    html += `<div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:6px;">sorted</div>`;
    html += renderRow(s.arr.map((v,i)=>{
      const color = i<=mid?'info':'warning';
      return makeCell(v,color,`i=${i}`);
    }).join(''));
    html += `<div style="font-size:12px;color:var(--color-text-tertiary);margin:10px 0 6px;">median boundary at index ${mid} (value=${sorted[mid]})</div>`;
  }

  if (s.phase === 'halves') {
    html += `<div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:6px;">smaller half → odd positions</div>`;
    html += renderRow(s.small.map((v,i)=>makeCell(v,'info',`s[${i}]`)).join(''));
    html += `<div style="font-size:12px;color:var(--color-text-tertiary);margin:10px 0 6px;">larger half → even positions</div>`;
    html += renderRow(s.large.map((v,i)=>makeCell(v,'warning',`l[${i}]`)).join(''));
  }

  if (s.phase === 'placing') {
    const res = s.result;
    html += `<div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:6px;">result array</div>`;
    html += renderRow(res.map((v,i)=>{
      const color = v===null?'secondary':(i%2===1?'info':'warning');
      return makeCell(v===null?'_':v, color, `[${i}]`);
    }).join(''));

    html += `<div style="font-size:12px;color:var(--color-text-tertiary);margin:12px 0 6px;">placement order</div>`;
    html += `<div style="display:flex;gap:6px;flex-wrap:wrap;">`;
    for (const p of s.placing) {
      html += `<div style="font-size:12px;padding:3px 8px;border-radius:var(--border-radius-md);background:${p.type==='small'?'var(--color-background-info)':'var(--color-background-warning)'};color:${p.type==='small'?'var(--color-text-info)':'var(--color-text-warning)'};">
        [${p.idx}]←${p.val}
      </div>`;
    }
    html += '</div>';
  }

  if (s.phase === 'done') {
    html += `<div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:6px;">final result</div>`;
    html += renderRow(s.result.map((v,i)=>{
      const color = i%2===1?'info':'warning';
      return makeCell(v, color, `[${i}]`);
    }).join(''));

    html += `<div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;">`;
    for (let i=0;i<n-1;i++) {
      const ok = i%2===0 ? s.result[i]<s.result[i+1] : s.result[i]>s.result[i+1];
      const sym = i%2===0 ? '<' : '>';
      html += `<div style="font-size:13px;padding:4px 8px;border-radius:var(--border-radius-md);background:${ok?'var(--color-background-success)':'var(--color-background-danger)'};color:${ok?'var(--color-text-success)':'var(--color-text-danger)'};">${s.result[i]} ${sym} ${s.result[i+1]}</div>`;
    }
    html += '</div>';
  }

  document.getElementById('widget-body').innerHTML = html;
}

document.getElementById('prev-btn').addEventListener('click',()=>{idx=Math.max(0,idx-1);render();});
document.getElementById('next-btn').addEventListener('click',()=>{idx=Math.min(steps.length-1,idx+1);render();});
render();
</script>
