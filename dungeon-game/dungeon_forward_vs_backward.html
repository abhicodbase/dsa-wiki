
<style>
* { box-sizing: border-box; }
h2.sr-only { position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0); }
.wrap { padding: 1rem 0; }
.toggle-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.toggle-row button { font-size: 13px; padding: 6px 18px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; flex: 1; }
.toggle-row button.active { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); font-weight: 500; }
.toggle-row button:hover:not(.active) { background: var(--color-background-secondary); }
.explain { background: var(--color-background-primary); border-left: 3px solid #7F77DD; border-radius: 0; padding: 0.65rem 1rem; font-size: 13px; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 12px; }
.explain .lbl { font-size: 11px; font-weight: 500; color: #534AB7; text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 3px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.cell { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 0.75rem; text-align: center; transition: background .2s, border-color .2s; }
.cell.active { background: var(--color-background-info); border: 1px solid var(--color-border-info); }
.cell.done { background: var(--color-background-secondary); }
.cell .dungeon-val { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; font-family: var(--font-mono); }
.cell .dp-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); font-family: var(--font-mono); }
.cell.empty .dp-val { color: var(--color-text-tertiary); font-size: 16px; }
.nav { display: flex; align-items: center; gap: 10px; margin-top: 0.5rem; }
.nav button { font-size: 13px; padding: 5px 18px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
.nav button:disabled { opacity: .35; cursor: default; }
.nav button:not(:disabled):hover { background: var(--color-background-secondary); }
.dots { display: flex; gap: 5px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-border-secondary); }
.dot.on { background: #7F77DD; }
.ctr { font-size: 12px; color: var(--color-text-secondary); margin-left: auto; }
.result-line { font-size: 13px; color: var(--color-text-secondary); margin-top: 8px; }
.result-line b { font-weight: 500; color: var(--color-text-primary); }
</style>

<h2 class="sr-only">Side-by-side comparison of forward and backward dynamic programming on the dungeon grid [[-2,-3,3],[-5,-10,1],[10,-30,5]], showing why forward DP fails and backward DP works</h2>

<div class="wrap">
  <div class="toggle-row">
    <button id="btn-fwd" class="active" onclick="setMode('fwd')">Forward (broken)</button>
    <button id="btn-bwd" onclick="setMode('bwd')">Backward (correct)</button>
  </div>
  <div class="explain">
    <span class="lbl" id="lbl">step</span>
    <span id="txt"></span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="result-line" id="result"></div>
  <div class="nav">
    <button id="prev" onclick="go(-1)">← Prev</button>
    <div class="dots" id="dots"></div>
    <button id="next" onclick="go(1)">Next →</button>
    <span class="ctr" id="ctr"></span>
  </div>
</div>

<script>
const dungeon = [[-2,-3,3],[-5,-10,1],[10,-30,5]];

const fwdSteps = [
  {
    lbl: 'setup — forward approach',
    txt: 'Forward DP tries to track "best health so far" while walking from top-left to bottom-right. health[0][0] = dungeon[0][0] = -2.',
    dp: {'0,0':-2}, active:['0,0'], done:[]
  },
  {
    lbl: 'fill first row and column',
    txt: 'Accumulate sums along row 0 and column 0: health[0][1]=-5, health[0][2]=-2, health[1][0]=-7, health[2][0]=3.',
    dp: {'0,0':-2,'0,1':-5,'0,2':-2,'1,0':-7,'2,0':3}, active:[], done:['0,0','0,1','0,2','1,0','2,0']
  },
  {
    lbl: 'cell (1,1) — the problem appears',
    txt: 'At (1,1), forward DP must choose: come from (0,1) with health -5, or from (1,0) with health -7. It picks -5 (better so far) and adds -10 → health=-15.',
    dp: {'0,0':-2,'0,1':-5,'0,2':-2,'1,0':-7,'2,0':3,'1,1':-15}, active:['1,1'], done:['0,0','0,1','0,2','1,0','2,0']
  },
  {
    lbl: 'but this choice is locally greedy',
    txt: 'Forward DP picked the path with better health "so far" — but it has no idea that the path through (1,0) might lead to better outcomes ahead (cell (2,0)=10 is a big heal!). It already discarded that information.',
    dp: {'0,0':-2,'0,1':-5,'0,2':-2,'1,0':-7,'2,0':3,'1,1':-15}, active:[], done:['0,0','0,1','0,2','1,0','2,0','1,1']
  },
  {
    lbl: 'the fundamental flaw',
    txt: 'The HP needed at the start depends on the WORST point along the entire path — not just the sum. Two paths with the same final sum can need very different starting HP depending on where the dips occur. Forward DP cannot see future dips when making a choice now.',
    dp: {'0,0':-2,'0,1':-5,'0,2':-2,'1,0':-7,'2,0':3,'1,1':-15}, active:[], done:['0,0','0,1','0,2','1,0','2,0','1,1']
  },
  {
    lbl: 'conclusion',
    txt: 'No amount of patching "minHealth" trackers fixes this — the decision at each cell needs information about cells NOT YET VISITED. That information only exists if we compute backward, from the goal toward the start.',
    dp: {}, active:[], done:[], result: 'Forward DP cannot correctly solve this problem.'
  }
];

const bwdSteps = [
  {
    lbl: 'setup — backward approach',
    txt: 'dp[i][j] = minimum HP needed UPON ENTERING (i,j) to survive to the end. We compute from bottom-right back to top-left — the opposite direction of travel.',
    dp: {}, active:['2,2'], done:[]
  },
  {
    lbl: 'base case — bottom-right cell',
    txt: 'dp[2][2] = max(1, 1 - dungeon[2][2]) = max(1, 1-5) = max(1,-4) = 1. Even though dungeon gives +5 here, HP can never be < 1, so dp=1.',
    dp: {'2,2':1}, active:['2,2'], done:[]
  },
  {
    lbl: 'last row — only "right" neighbor exists',
    txt: 'dp[2][1] = max(1, dp[2][2] - dungeon[2][1]) = max(1, 1-(-30)) = max(1,31) = 31. dp[2][0] = max(1, dp[2][1] - dungeon[2][0]) = max(1, 31-10) = 21.',
    dp: {'2,2':1,'2,1':31,'2,0':21}, active:['2,1','2,0'], done:['2,2']
  },
  {
    lbl: 'last column — only "down" neighbor exists',
    txt: 'dp[1][2] = max(1, dp[2][2] - dungeon[1][2]) = max(1, 1-1) = max(1,0) = 1. dp[0][2] = max(1, dp[1][2] - dungeon[0][2]) = max(1, 1-3) = max(1,-2) = 1.',
    dp: {'2,2':1,'2,1':31,'2,0':21,'1,2':1,'0,2':1}, active:['1,2','0,2'], done:['2,2','2,1','2,0']
  },
  {
    lbl: 'cell (1,1) — choose the cheaper future',
    txt: 'dp[1][1] = max(1, min(dp[2][1], dp[1][2]) - dungeon[1][1]) = max(1, min(31,1) - (-10)) = max(1, 1+10) = 11. We pick the path toward (1,2) because it needs less future HP (1 < 31).',
    dp: {'2,2':1,'2,1':31,'2,0':21,'1,2':1,'0,2':1,'1,1':11}, active:['1,1'], done:['2,2','2,1','2,0','1,2','0,2']
  },
  {
    lbl: 'cell (1,0)',
    txt: 'dp[1][0] = max(1, min(dp[2][0], dp[1][1]) - dungeon[1][0]) = max(1, min(21,11) - (-5)) = max(1, 11+5) = 16.',
    dp: {'2,2':1,'2,1':31,'2,0':21,'1,2':1,'0,2':1,'1,1':11,'1,0':16}, active:['1,0'], done:['2,2','2,1','2,0','1,2','0,2','1,1']
  },
  {
    lbl: 'cell (0,1)',
    txt: 'dp[0][1] = max(1, min(dp[1][1], dp[0][2]) - dungeon[0][1]) = max(1, min(11,1) - (-3)) = max(1, 1+3) = 4.',
    dp: {'2,2':1,'2,1':31,'2,0':21,'1,2':1,'0,2':1,'1,1':11,'1,0':16,'0,1':4}, active:['0,1'], done:['2,2','2,1','2,0','1,2','0,2','1,1','1,0']
  },
  {
    lbl: 'cell (0,0) — final answer',
    txt: 'dp[0][0] = max(1, min(dp[1][0], dp[0][1]) - dungeon[0][0]) = max(1, min(16,4) - (-2)) = max(1, 4+2) = 6.',
    dp: {'2,2':1,'2,1':31,'2,0':21,'1,2':1,'0,2':1,'1,1':11,'1,0':16,'0,1':4,'0,0':6}, active:['0,0'], done:['2,2','2,1','2,0','1,2','0,2','1,1','1,0','0,1'], result: 'Answer = 6. The knight needs 6 starting HP.'
  }
];

let mode = 'fwd';
let cur = 0;

function setMode(m) {
  mode = m;
  cur = 0;
  document.getElementById('btn-fwd').classList.toggle('active', m==='fwd');
  document.getElementById('btn-bwd').classList.toggle('active', m==='bwd');
  render();
}

function render() {
  const steps = mode === 'fwd' ? fwdSteps : bwdSteps;
  const s = steps[cur];

  document.getElementById('lbl').textContent = s.lbl;
  document.getElementById('txt').textContent = s.txt;

  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < 3; j++) {
      const key = i+','+j;
      const isActive = s.active.includes(key);
      const isDone = s.done.includes(key);
      const hasVal = key in s.dp;
      const div = document.createElement('div');
      div.className = 'cell' + (isActive?' active':'') + (isDone?' done':'') + (!hasVal?' empty':'');
      div.innerHTML = `<div class="dungeon-val">d=${dungeon[i][j]}</div><div class="dp-val">${hasVal ? s.dp[key] : '—'}</div>`;
      gridEl.appendChild(div);
    }
  }

  document.getElementById('result').innerHTML = s.result ? `<b>${s.result}</b>` : '';

  document.getElementById('dots').innerHTML = steps.map((_,i)=>`<div class="dot${i===cur?' on':''}"></div>`).join('');
  document.getElementById('prev').disabled = cur===0;
  document.getElementById('next').disabled = cur===steps.length-1;
  document.getElementById('ctr').textContent = `${cur+1} / ${steps.length}`;
}

function go(d) {
  const steps = mode === 'fwd' ? fwdSteps : bwdSteps;
  cur = Math.max(0,Math.min(steps.length-1,cur+d));
  render();
}
render();
</script>
