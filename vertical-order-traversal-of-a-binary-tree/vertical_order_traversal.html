
<h2 class="sr-only">Vertical order traversal — step-by-step visual showing how col and row coordinates are assigned during DFS, then sorted per column</h2>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
  <div style="font-size:13px;color:var(--color-text-secondary);" id="step-label">Step 1</div>
  <div style="display:flex;gap:8px;">
    <button id="prev-btn"><i class="ti ti-arrow-left" aria-hidden="true"></i> Prev</button>
    <button id="next-btn">Next <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
  </div>
</div>

<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--color-text-secondary);">
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:11px;height:11px;border-radius:50%;background:var(--color-background-info);border:0.5px solid var(--color-border-info);display:inline-block;"></span>currently visiting</span>
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:11px;height:11px;border-radius:50%;background:var(--color-background-success);border:0.5px solid var(--color-border-success);display:inline-block;"></span>already visited</span>
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:11px;height:11px;border-radius:50%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);display:inline-block;"></span>not yet visited</span>
</div>

<svg id="tree-svg" viewBox="0 0 560 200" style="width:100%;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:12px;"></svg>

<div style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:12px;" id="col-buckets"></div>

<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;font-size:13px;line-height:1.8;min-height:76px;" id="explain-box"></div>

<script>
const tree = {
  val:1, row:0, col:0,
  left:{ val:2, row:1, col:-1,
    left:{ val:4, row:2, col:-2, left:null, right:null },
    right:{ val:5, row:2, col:0, left:null, right:null }
  },
  right:{ val:3, row:1, col:1,
    left:{ val:6, row:2, col:0, left:null, right:null },
    right:{ val:7, row:2, col:2, left:null, right:null }
  }
};

const nodePos = {
  1:{x:280,y:36}, 2:{x:160,y:96}, 3:{x:400,y:96},
  4:{x:90,y:156}, 5:{x:230,y:156}, 6:{x:350,y:156}, 7:{x:470,y:156}
};
const edges = [[1,2],[1,3],[2,4],[2,5],[3,6],[3,7]];

const dfsOrder = [
  {val:1,row:0,col:0},
  {val:2,row:1,col:-1},
  {val:4,row:2,col:-2},
  {val:5,row:2,col:0},
  {val:3,row:1,col:1},
  {val:6,row:2,col:0},
  {val:7,row:2,col:2}
];

function buildMap(visited) {
  const mp = {};
  for (const v of visited) {
    if (!mp[v.col]) mp[v.col] = [];
    mp[v.col].push({row:v.row, val:v.val});
  }
  for (const col in mp) {
    mp[col].sort((a,b)=> a.row!==b.row ? a.row-b.row : a.val-b.val);
  }
  return mp;
}

const steps = [];

steps.push({
  visiting: null, visited: [],
  msg: `<strong>Setup.</strong> We do a DFS and assign every node a <strong>(row, col)</strong> coordinate. Root starts at (0,0). Going left → col−1, right → col+1. Going deeper → row+1. We store all nodes in a map keyed by col. After DFS, sort each col by (row, val) to get the answer.`
});

let visited = [];
for (let i = 0; i < dfsOrder.length; i++) {
  const node = dfsOrder[i];
  visited = visited.concat([node]);
  const mp = buildMap(visited);
  steps.push({
    visiting: node.val,
    visited: visited.map(v=>v.val),
    mp,
    msg: `<strong>Visit node ${node.val}</strong> → assigned (row=${node.row}, col=${node.col}). Added to map[${node.col}]. Map now has ${Object.keys(mp).length} column(s).`
  });
}

const finalMp = buildMap(dfsOrder);
steps.push({
  visiting: null,
  visited: dfsOrder.map(v=>v.val),
  mp: finalMp,
  done: true,
  msg: `<strong>DFS done.</strong> Now sort each column's list by (row, then val as tiebreaker). Since <code>pair&lt;int,int&gt;</code> sorts lexicographically, <code>sort(nodes.begin(), nodes.end())</code> handles it automatically. Final answer: <strong>${Object.keys(finalMp).sort((a,b)=>a-b).map(col=> '['+finalMp[col].map(n=>n.val).join(',')+']').join(', ')}</strong>`
});

const colOrder = [-2,-1,0,1,2];
const colLabels = {'-2':'col −2','-1':'col −1','0':'col 0','1':'col +1','2':'col +2'};

let idx = 0;

function drawTree(visitingVal, visitedVals) {
  const svg = document.getElementById('tree-svg');
  svg.innerHTML = '';

  const colLaneColors = {'-2':'#E6F1FB','-1':'#EAF3DE','0':'#EEEDFE','1':'#FAEEDA','2':'#FAECE7'};
  const colLaneX = {'-2':55,'-1':145,'0':235,'1':370,'2':445};
  const colLaneW = 80;

  for (const col of colOrder) {
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', colLaneX[col]); rect.setAttribute('y',10);
    rect.setAttribute('width', colLaneW); rect.setAttribute('height',185);
    rect.setAttribute('rx',6); rect.setAttribute('fill', colLaneColors[col]);
    rect.setAttribute('opacity','0.35');
    svg.appendChild(rect);
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', colLaneX[col]+colLaneW/2); txt.setAttribute('y',24);
    txt.setAttribute('text-anchor','middle'); txt.setAttribute('font-size','10');
    txt.setAttribute('fill','var(--color-text-tertiary)');
    txt.textContent = colLabels[col];
    svg.appendChild(txt);
  }

  for (const [p,c] of edges) {
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',nodePos[p].x); line.setAttribute('y1',nodePos[p].y);
    line.setAttribute('x2',nodePos[c].x); line.setAttribute('y2',nodePos[c].y);
    line.setAttribute('stroke','var(--color-border-secondary)'); line.setAttribute('stroke-width','1.5');
    svg.appendChild(line);
  }

  for (const [v, pos] of Object.entries(nodePos)) {
    const val = parseInt(v);
    let fill = 'var(--color-background-primary)';
    let stroke = 'var(--color-border-secondary)';
    let textFill = 'var(--color-text-primary)';
    if (val === visitingVal) { fill='var(--color-background-info)'; stroke='var(--color-border-info)'; textFill='var(--color-text-info)'; }
    else if (visitedVals.includes(val)) { fill='var(--color-background-success)'; stroke='var(--color-border-success)'; textFill='var(--color-text-success)'; }
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',pos.x); circle.setAttribute('cy',pos.y);
    circle.setAttribute('r',18); circle.setAttribute('fill',fill);
    circle.setAttribute('stroke',stroke); circle.setAttribute('stroke-width','1');
    svg.appendChild(circle);
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',pos.x); txt.setAttribute('y',pos.y+5);
    txt.setAttribute('text-anchor','middle'); txt.setAttribute('font-size','13');
    txt.setAttribute('font-weight','500'); txt.setAttribute('fill',textFill);
    txt.textContent = val;
    svg.appendChild(txt);

    const node = dfsOrder.find(n=>n.val===val);
    if (node) {
      const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
      lbl.setAttribute('x',pos.x); lbl.setAttribute('y',pos.y+30);
      lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('font-size','9');
      lbl.setAttribute('fill','var(--color-text-tertiary)');
      lbl.textContent = `r${node.row},c${node.col}`;
      svg.appendChild(lbl);
    }
  }
}

function renderBuckets(mp) {
  const container = document.getElementById('col-buckets');
  container.innerHTML = '';
  const bgColors = {'-2':'var(--color-background-info)','-1':'var(--color-background-success)','0':'var(--color-background-secondary)','1':'var(--color-background-warning)','2':'var(--color-background-danger)'};
  for (const col of colOrder) {
    const card = document.createElement('div');
    card.style.cssText=`border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px;min-height:64px;`;
    const header = document.createElement('div');
    header.style.cssText=`font-size:11px;color:var(--color-text-tertiary);margin-bottom:6px;`;
    header.textContent = colLabels[col];
    card.appendChild(header);
    if (mp && mp[col]) {
      for (const {row, val} of mp[col]) {
        const pill = document.createElement('div');
        pill.style.cssText=`font-size:12px;font-weight:500;color:var(--color-text-primary);background:${bgColors[col]};border-radius:var(--border-radius-md);padding:2px 7px;margin-bottom:3px;display:inline-block;margin-right:3px;`;
        pill.textContent = `${val} (r${row})`;
        card.appendChild(pill);
      }
    }
    container.appendChild(card);
  }
}

function render() {
  const s = steps[idx];
  document.getElementById('step-label').textContent = `Step ${idx+1} of ${steps.length}`;
  document.getElementById('explain-box').innerHTML = s.msg;
  drawTree(s.visiting, s.visited || []);
  renderBuckets(s.mp || {});
}

document.getElementById('prev-btn').addEventListener('click',()=>{idx=Math.max(0,idx-1);render();});
document.getElementById('next-btn').addEventListener('click',()=>{idx=Math.min(steps.length-1,idx+1);render();});
render();
</script>
